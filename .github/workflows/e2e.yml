name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # nightly 03:00 UTC

jobs:
  e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      # Using `npm install` instead of `npm ci`: the lockfile is authored on
      # Windows and the Linux runner pulls different platform-conditional
      # @emnapi optional deps — known npm bug (npm/cli#4828). Same reasoning
      # as pages.yml + test.yml.
      - run: npm install --no-audit --no-fund
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Unit tests
        run: npm test
      - name: TS type-check
        run: npx tsc --noEmit
      - name: Playwright E2E
        run: npm run test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
