name: Deploy to Pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      # Using `npm install` instead of `npm ci` because the lockfile is
      # authored on Windows and the Linux runner pulls different
      # platform-conditional @emnapi optional deps — a known npm bug
      # (npm/cli#4828). Reconciliation is acceptable here; for stricter
      # projects: generate the lockfile on Linux in a Docker step first.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: '${{ steps.deploy.outputs.page_url }}' }
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
