name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm install --no-audit --no-fund
      - name: Run Vitest
        run: npm test
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
